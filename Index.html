<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Enlaces | Perfil</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --btn-bg: #1e293b;
            --btn-hover: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            margin: 0;
        }
        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
        }
        .links-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .link-card {
            background-color: var(--btn-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 1rem;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #334155;
        }
        .link-card:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile">
        <img src="https://via.placeholder.com/96" alt="Foto de perfil">
        <h2>@Nalgones 18+</h2>
        <p>Para los amantes de los culos</p>
    </div>

    <div class="links-container">
        <a href="https://github.com/tu-usuario" target="_blank" class="link-card">GitHub</a>
        <a href="https://linkedin.com/in/tu-usuario" target="_blank" class="link-card">LinkedIn</a>
        <a href="https://tu-portafolio.com" target="_blank" class="link-card">Portafolio Web</a>
        <a href="https://twitter.com/tu-usuario" target="_blank" class="link-card">Twitter / X</a>
    </div>

</body>
</html>
